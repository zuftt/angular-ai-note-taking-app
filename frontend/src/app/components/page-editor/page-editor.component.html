<div class="editor-shell">

  <!-- Top bar -->
  <div class="top-bar">
    <button class="bar-btn" (click)="toggleSidebar.emit()" title="Toggle sidebar">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <rect x="1" y="2.5" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="6.75" width="13" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="1" y="11" width="13" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>

    <div class="breadcrumb" *ngIf="editing; else emptyBread">
      <span class="bread-icon">{{ editing.icon || '📄' }}</span>
      <span class="bread-title">{{ editing.title || 'Untitled' }}</span>
    </div>
    <ng-template #emptyBread><div class="breadcrumb"></div></ng-template>

    <div class="bar-right">
      <span class="save-pill" [class.saving]="isSaving" *ngIf="editing">
        <span class="save-dot"></span>
        {{ isSaving ? 'Saving' : 'Saved' }}
      </span>

      <button
        *ngIf="editing"
        class="bar-btn preview-toggle"
        [class.active]="previewMode"
        (click)="previewMode = !previewMode"
        title="Toggle markdown preview"
      >
        <span>{{ previewMode ? '✏️ Edit' : '👁 Preview' }}</span>
      </button>

      <button
        class="bar-btn ai-toggle"
        [class.active]="aiPanelOpen"
        (click)="toggleAiPanel.emit()"
        title="AI Assistant"
      >
        <span class="ai-star">✦</span>
        <span class="ai-label">Ask AI</span>
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="!editing" class="empty-state">
    <div class="empty-inner">
      <div class="empty-icon">📄</div>
      <h2 class="empty-title">No page selected</h2>
      <p class="empty-body">Pick a page from the sidebar, or create a new one.</p>
    </div>
  </div>

  <!-- Page content -->
  <div *ngIf="editing" class="page-content" (click)="showIconPicker = false; showCommandMenu = false">

    <!-- Icon + picker -->
    <div class="icon-row">
      <button class="icon-btn" (click)="showIconPicker = !showIconPicker; $event.stopPropagation()">
        {{ editing.icon || '📄' }}
      </button>
      <div *ngIf="showIconPicker" class="icon-picker" (click)="$event.stopPropagation()">
        <button *ngFor="let ic of ICONS" class="icon-option" (click)="setIcon(ic)">{{ ic }}</button>
      </div>
    </div>

    <!-- Title -->
    <input
      class="page-title"
      type="text"
      placeholder="Untitled"
      [ngModel]="editing.title"
      (ngModelChange)="onTitleChange($event)"
    />

    <!-- Location breadcrumb -->
    <div *ngIf="locationParent || locationFolder" class="location-row">
      <ng-container *ngIf="locationParent">
        <span class="location-crumb parent-crumb">
          <svg width="12" height="12" viewBox="0 0 15 15" fill="none">
            <rect x="1" y="2" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 6h7M4 9h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          {{ locationParent }}
        </span>
        <span class="location-sep">›</span>
      </ng-container>
      <ng-container *ngIf="locationFolder">
        <span class="location-crumb folder-crumb">
          <svg width="12" height="12" viewBox="0 0 15 15" fill="none">
            <path d="M1 4.5C1 3.67 1.67 3 2.5 3H5.8l1.2 1.5H12.5c.83 0 1.5.67 1.5 1.5V11c0 .83-.67 1.5-1.5 1.5h-10C1.67 12.5 1 11.83 1 11V4.5z" fill="currentColor" opacity=".15" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          {{ locationFolder }}
        </span>
      </ng-container>
    </div>

    <!-- Tags row -->
    <div class="tags-row">
      <span *ngFor="let tag of editing.tags" class="tag-chip">
        <span class="tag-hash">#</span>{{ tag }}
        <button class="tag-remove" (click)="removeTag(tag)" title="Remove tag">×</button>
      </span>
      <input
        #tagInput
        class="tag-input"
        type="text"
        placeholder="Add tag…"
        (keydown.enter)="addTag(tagInput); tagInput.value = ''"
        (click)="$event.stopPropagation()"
      />
    </div>

    <!-- Divider -->
    <div class="content-divider"></div>

    <!-- Content + command menu -->
    <div class="content-wrap">
      <textarea
        *ngIf="!previewMode"
        #contentArea
        class="content-area"
        placeholder="Type '/' for AI commands, or start writing… (supports Markdown)"
        [ngModel]="editing.content"
        (ngModelChange)="onContentChange($event)"
        (keydown)="onContentKeydown($event)"
        (click)="$event.stopPropagation()"
      ></textarea>

      <div
        *ngIf="previewMode"
        class="markdown-preview"
        [innerHTML]="renderedMarkdown"
        (click)="$event.stopPropagation()"
      ></div>

      <div *ngIf="showCommandMenu && filteredCommandItems.length > 0" class="command-menu">
        <div class="command-group-label">AI Actions</div>
        <button
          *ngFor="let item of filteredCommandItems"
          class="command-item"
          (click)="runCommand(item.action); $event.stopPropagation()"
        >
          <span class="command-icon">{{ item.icon }}</span>
          <span class="command-label">{{ item.label }}</span>
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="page-meta">
      <span>{{ wordCount }} words</span>
      <span class="meta-sep">·</span>
      <span>{{ readingTime }}</span>
    </div>

  </div>
</div>
