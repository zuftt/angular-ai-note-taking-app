<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App - Edge LLM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; height: 100vh; display: flex; }

    .sidebar { width: 280px; background: #f0f0f0; border-right: 1px solid #ddd; padding: 16px; overflow-y: auto; }
    .main { flex: 1; display: flex; }
    .editor { flex: 1; padding: 20px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
    .ai-panel { width: 320px; background: #fafafa; border-left: 1px solid #ddd; padding: 16px; overflow-y: auto; }

    h2 { font-size: 18px; margin-bottom: 16px; }
    button { background: #0066cc; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-bottom: 8px; }
    button:hover { background: #0052a3; }

    .folder-item { padding: 8px; cursor: pointer; border-radius: 4px; }
    .folder-item:hover { background: #e0e0e0; }
    .folder-item.active { background: #0066cc; color: white; }

    input[type="text"], textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: system-ui; }
    textarea { flex: 1; resize: none; margin: 16px 0; font-family: monospace; }

    .note-title { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
    .word-count { color: #666; font-size: 12px; margin-top: 8px; }

    .ai-button { width: 100%; margin-bottom: 8px; background: #a855f7; }
    .ai-button:hover { background: #9333ea; }

    .chat-box { border: 1px solid #ddd; border-radius: 4px; height: 300px; overflow-y: auto; padding: 8px; margin: 16px 0; background: white; }
    .chat-msg { padding: 8px; margin: 4px 0; border-radius: 4px; }
    .chat-user { background: #e3f2fd; text-align: right; }
    .chat-ai { background: #f3e5f5; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>📁 Notes</h2>
    <button onclick="newFolder()">+ New Folder</button>
    <div class="folder-item active" onclick="selectFolder(null)">All Notes</div>
    <div id="folders"></div>
  </div>

  <div class="main">
    <div class="editor">
      <div id="notesListSection" style="flex: 1; overflow-y: auto;">
        <h2>Notes</h2>
        <button onclick="newNote()">+ New Note</button>
        <div id="notesList"></div>
      </div>

      <div id="editorSection" style="display: none; flex: 1;">
        <input type="text" id="noteTitle" placeholder="Note title" onchange="saveNote()">
        <textarea id="noteContent" placeholder="Write your note..." onchange="saveNote()"></textarea>
        <div class="word-count"><span id="wordCount">0</span> words</div>
        <button onclick="deleteNote()" style="background: #cc0000;">Delete</button>
      </div>
    </div>

    <div class="ai-panel">
      <h2>🤖 AI Assistant</h2>
      <button class="ai-button" onclick="summarize()">📝 Summarize</button>
      <button class="ai-button" onclick="generateTags()">🏷️ Tags</button>

      <h3 style="font-size: 14px; margin-top: 20px;">Q&A</h3>
      <div class="chat-box" id="chatBox"></div>
      <input type="text" id="question" placeholder="Ask about this note..." onkeypress="handleQuestion(event)">
      <button class="ai-button" onclick="askQuestion()">Ask</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers"></script>
  <script src="app.js"></script>
</body>
</html>
